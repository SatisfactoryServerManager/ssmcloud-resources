syntax = "proto3";

option go_package = "github.com/SatisfactoryServerManager/ssmcloud-resources/proto/generated";

import "models/agent.proto";
import "models/user.proto";
import "models/mod.proto";
import "models/empty.proto";
import "models/workflow.proto";
import "models/integration.proto";

service FrontendService {
    rpc CheckUserExistsOrCreate(CheckUserExistsOrCreateRequest) returns (SSMEmpty);

    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc GetUserLinkedAccounts(GetUserLinkedAccountsRequest) returns (GetUserLinkedAccountsResponse);
    rpc GetUserActiveAccount(GetUserActiveAccountRequest) returns (GetUserActiveAccountResponse);
    rpc GetUserActiveAccountAgents(GetUserActiveAccountAgentsRequest) returns (GetUserActiveAccountAgentsResponse);
    rpc GetUserActiveAccountUsers(GetUserActiveAccountUsersRequest) returns (GetUserActiveAccountUsersResponse);
    rpc GetUserActiveAccountAudits(GetUserActiveAccountAuditsRequest) returns (GetUserActiveAccountAuditsResponse);
    rpc GetUserActiveAccountIntegrations(GetUserActiveAccountIntegrationsRequest) returns (GetUserActiveAccountIntegrationsResponse);


    rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
    rpc GetAgentLog(GetAgentLogRequest) returns (GetAgentLogResponse);
    rpc GetAgentStats(GetAgentStatsRequest) returns (GetAgentStatsResponse);
    rpc GetAgentMods(GetAgentModsRequest) returns (GetAgentModsResponse);

    rpc CreateAgentTask(CreateAgentTaskRequest) returns (CreateAgentTaskResponse);
    rpc GetAgentTasks(GetAgentTasksRequest) returns (GetAgentTasksResponse);
    rpc CancelAgentTask(CancelAgentTaskRequest) returns (SSMEmpty);
    rpc RetryAgentTask(RetryAgentTaskRequest) returns (SSMEmpty);
    rpc PreviewModChange(ModChangeRequest) returns (PreviewModChangeResponse);
    rpc ApplyModChange(ApplyModChangeRequest) returns (ApplyModChangeResponse);
    rpc UpdateAgentModConfigText(UpdateAgentModConfigTextRequest) returns (SSMEmpty);
    rpc UpdateAgentSettings(UpdateAgentSettingsRequest) returns (SSMEmpty);
    rpc CreateAgent(CreateAgentRequest) returns(CreateAgentResponse);
    rpc DeleteAgent(DeleteAgentRequest) returns(SSMEmpty);

    rpc SwitchActiveAccount(SwitchActiveAccountRequest) returns (SSMEmpty);
    rpc CreateAccount(CreateAccountRequest) returns (SSMEmpty);
    rpc JoinAccount(JoinAccountRequest) returns (SSMEmpty);
    rpc DeleteAccount(DeleteAccountRequest) returns(SSMEmpty);

    rpc GetAccountIntegrationEvents(GetAccountIntegrationEventsRequest) returns (GetAccountIntegrationEventsResponse);



    rpc UploadSaveFile(stream UploadSaveFileRequest) returns (UploadSaveFileResponse);

    rpc GetAgentWorkflow(GetAgentWorkflowRequest) returns(GetAgentWorkflowResponse);
    rpc GetAgentWorkflowByAgent(GetAgentWorkflowByAgentRequest) returns(GetAgentWorkflowResponse);

    rpc DownloadFile(FrontendDownloadRequest) returns (stream DownloadFileChunk);
    rpc AddAccountIntegration(AddAccountIntegrationRequest) returns (SSMEmpty);
    rpc UpdateAccountIntegration(UpdateAccountIntegrationRequest) returns (SSMEmpty);
    rpc DeleteAccountIntegration(DeleteAccountIntegrationRequest) returns (SSMEmpty);

}

enum FrontendDownloadKind {
    FRONTEND_DOWNLOAD_SAVE = 0;
    FRONTEND_DOWNLOAD_BACKUP = 1;
    FRONTEND_DOWNLOAD_LOG = 2;
}

message FrontendDownloadRequest {
    string eid = 1;
    string agent_id = 2;
    FrontendDownloadKind kind = 3;
    string uuid = 4;      // for save/backup
    string logtype = 5;   // for log
    int64 start_offset = 6;
}
message DownloadFileChunk { bytes chunk = 1; }

message AddAccountIntegrationRequest {
    string eid = 1;
    string name = 2;
    int32 type = 3;
    string url = 4;
    repeated string event_types = 5;
}
message UpdateAccountIntegrationRequest {
    string integration_id = 1;
    string name = 2;
    int32 type = 3;
    string url = 4;
    repeated string event_types = 5;
}
message DeleteAccountIntegrationRequest {
    string eid = 1;
    string integration_id = 2;
}

message CheckUserExistsOrCreateRequest {
    string email = 1;
    string eid = 2;
    string username = 3;
}

message GetUserRequest {
    string eid = 1;
}

message GetUserResponse {
  User user = 1;
}

message GetUserLinkedAccountsRequest {
    string eid = 1;
}

message GetUserLinkedAccountsResponse {
    repeated Account linked_accounts = 1;
}

message GetUserActiveAccountRequest {
    string eid = 1;
}

message GetUserActiveAccountResponse {
    Account active_account = 1;
}

message GetUserActiveAccountAgentsRequest {
    string eid = 1;
}

message GetUserActiveAccountAgentsResponse {
    repeated Agent agents = 1;
}

message GetUserActiveAccountUsersRequest {
    string eid = 1;
}

message GetUserActiveAccountUsersResponse {
    repeated User users = 1;
}

message GetUserActiveAccountAuditsRequest {
    string eid = 1;
    string type = 2;
}

message GetUserActiveAccountAuditsResponse {
    repeated AccountAudit audits = 1;
}

message GetAgentRequest {
    string eid = 1;
    string agent_id = 2;
}

message GetAgentResponse {
    Agent agent = 1;
}

message GetAgentLogRequest {
    string eid = 1;
    string agent_id = 2;
    string type = 3;
    int32 last_index = 4;
}

message GetAgentLogResponse {
    AgentLog log = 1;
}

message GetAgentStatsRequest {
    string eid = 1;
    string agent_id = 2;
}

message GetAgentStatsResponse {
    repeated AgentStat stats = 1;
}

message CreateAgentTaskRequest{
    string eid = 1;
    string agent_id = 2;
    string action = 3;
}

message CreateAgentTaskResponse {
    string task_id = 1;
}

message AgentTaskView {
    string id = 1;
    string action = 2;
    string status = 3;
    int32  progress = 4;
    string message = 5;
    string last_error = 6;
    int32  attempts = 7;
    int32  max_attempts = 8;
    string triggered_by_type = 9;
    string triggered_by_external_id = 10;
    int64  created_at = 11;
    int64  started_at = 12;
    int64  finished_at = 13;
    // A pending task carrying this gate is waiting for the game server to stop,
    // i.e. it is DEFERRED. A pending task WITHOUT it is either claimable now or
    // gated behind its own chain's stopsfserver, which is about to run — the UI
    // cannot tell "waiting for the next restart" from "running right now"
    // without this.
    bool   requires_server_stopped = 14;
}

message GetAgentTasksRequest {
    string eid = 1;
    string agent_id = 2;
    int64  limit = 3;
}

message GetAgentTasksResponse {
    repeated AgentTaskView tasks = 1;
}

message CancelAgentTaskRequest {
    string eid = 1;
    string task_id = 2;
}

message RetryAgentTaskRequest {
    string eid = 1;
    string task_id = 2;
}


message GetAgentModsRequest {
    string eid = 1;
    string agent_id = 2;
    int32 page = 3;
    string sort = 4;
    string direction = 5;
    string search = 6;
    bool filter_available = 7;
    bool filter_installed = 8;
    bool only_updatable = 9;
    bool include_hidden = 10;
}

message GetAgentModsResponse {
    repeated Mod      mods       = 1;  // the catalogue page
    int64             totalCount = 2;
    repeated AgentMod agentMods  = 3;  // this agent's selection, whole
    int32             pages      = 4;
}

message ModChangeRequest {
    string agentId      = 1;
    string op           = 2;  // add | remove | setVersion | updateAll
    string modReference = 3;
    string version      = 4;  // setVersion only
    string eid          = 5;  // the calling user; scopes the agent to their active account
}

message ChangedMod {
    string modReference = 1;
    string from         = 2;
    string to           = 3;
    bool   dependency   = 4;
}

message PreviewModChangeResponse {
    repeated ChangedMod added   = 1;
    repeated ChangedMod removed = 2;
    repeated ChangedMod changed = 3;
    // True when the server is running, so the client knows to offer the
    // apply-now / apply-on-restart choice rather than just applying.
    bool serverRunning = 4;
}

message ApplyModChangeRequest {
    ModChangeRequest change   = 1;
    bool             applyNow = 2;
}

message ApplyModChangeResponse {
    repeated string taskIds = 1;
}

message UpdateAgentModConfigTextRequest {
    string agentId      = 1;
    string modReference = 2;
    string config       = 3;
    string eid          = 4;  // the calling user; scopes the agent to their active account
}

message UpdateAgentSettingsRequest{
    string eid = 1;
    string agent_id = 2;
    ServerSettings settings = 3;
}

message ServerSettings {
    string config_setting = 1;
    string update_on_start = 2;
    string auto_restart = 3;
    string auto_pause = 4;
    string auto_save_on_disconnect = 5;
    int32 auto_save_interval = 6;
    string seasonal_events = 7;
    int32 max_players = 8;
    int32 worker_threads = 9;
    string branch = 10;
    float backup_interval = 11;
    int32 backup_keep = 12;
    string mod_reference = 13;
    string mod_config = 14;
}

message UploadSaveFileRequest {
  oneof data {
    FileMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message FileMetadata {
  string eid = 1;
  string agent_id = 2;
  string filename = 3;
  string content_type = 4;
}

message UploadSaveFileResponse {
  string message = 1;
}

message CreateAgentRequest {
    string eid = 1;
    string agent_name = 2;
    int32 port = 3;
    float memory = 4;
    string admin_pass = 5;
    string client_pass = 6;
    string api_key = 7;
}

message CreateAgentResponse {
    string workflow_id = 1;
}

message DeleteAgentRequest {
    string eid = 1;
    string agent_id = 2;
}

message SwitchActiveAccountRequest {
    string eid = 1;
    string account_id = 2;
}

message CreateAccountRequest {
    string eid = 1;
    string account_name = 2;
}

message JoinAccountRequest {
    string eid = 1;
    string join_code = 2;
}

message GetAgentWorkflowRequest {
    string workflow_id = 1;
}

message GetAgentWorkflowByAgentRequest {
    string agent_id = 1;
}

message GetAgentWorkflowResponse {
    Workflow workflow = 1;
}

message DeleteAccountRequest {
    string eid = 1;
    string account_id = 2;
}

message GetUserActiveAccountIntegrationsRequest {
    string eid = 1;
}

message GetUserActiveAccountIntegrationsResponse {
    repeated AccountIntegration integrations = 1;
}

message GetAccountIntegrationEventsRequest {
    string integration_id = 1;
}

message GetAccountIntegrationEventsResponse {
    repeated IntegrationEvent events = 1;
}